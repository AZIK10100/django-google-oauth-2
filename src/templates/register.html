<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff7a18, #ffb347);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 450px;
        }

        .register-form {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
        }

        /* Styling Django's {{ form.as_p }} structure */
        .register-form p {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .register-form label {
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .register-form input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            background: white;
        }

        /* This hides/shrinks the long password requirement text if it's too messy */
        .helptext {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
            line-height: 1.3;
        }

        /* Styling error lists (e.g., "Passwords don't match") */
        .errorlist {
            color: #ffcfcf;
            font-size: 12px;
            list-style: none;
            margin-bottom: 10px;
            padding: 0;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #ff7a18;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff5200;
            transform: translateY(-2px);
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .link a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-container">
    <form class="register-form" method="POST">
        {% csrf_token %}
        <h2>Create Account</h2>

        {{ form.as_p }}

        <button type="submit">Sign Up</button>
        
        <p class="link">Already have an account? <a href="/googleauth/login/">Login</a></p>
    </form>
</div>

</body>
</html>
